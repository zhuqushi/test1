name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 添加手动触发选项

env:
  ANDROID_ACCEPT_LICENSE: "yes"  # 自动接受 Android 许可证
  ANDROID_BUILD_TOOLS_VERSION: "33.0.1"  # 指定稳定版本的 Build-Tools

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-8-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake
        # 安装 Android 相关工具依赖
        sudo apt-get install -y android-sdk-platform-tools

    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython virtualenv

    - name: Initialize Buildozer and install SDK components
      run: |
        # 初始化 Buildozer 并触发依赖下载
        buildozer android update
        # 查找 sdkmanager 路径
        SDKMANAGER=$(find ~/.buildozer -name sdkmanager | grep 'tools/bin/sdkmanager' | head -n 1)
        if [ -z "$SDKMANAGER" ]; then
          echo "Error: sdkmanager not found"
          exit 1
        fi
        # 强制接受所有许可证并安装指定版本的 Build-Tools
        yes | $SDKMANAGER --licenses
        $SDKMANAGER "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}" "platform-tools" "platforms;android-33"

    - name: Build with Buildozer
      run: |
        # 指定 Build-Tools 版本构建
        buildozer android debug
        ls -la bin/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: bin/*.apk
