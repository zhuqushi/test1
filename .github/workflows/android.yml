name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 添加手动触发选项

env:
  ANDROID_ACCEPT_LICENSE: "yes"  # 自动接受 Android 许可证

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-8-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake

    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        # 使用存在的 python-for-android 版本（2023.9.16 是 2023 年最新可用版本）
        pip3 install buildozer==1.5.0 python-for-android==2023.9.16 cython virtualenv

    - name: Initialize Buildozer and install dependencies
      run: |
        # 手动创建必要目录
        mkdir -p .buildozer/android/platform
        # 克隆 python-for-android 仓库作为备选
        git clone https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android
        # 安装仓库内的依赖
        cd .buildozer/android/platform/python-for-android
        pip3 install -e .
        cd ../../../../../
        # 初始化 Buildozer 配置
        buildozer init
        # 更新 Buildozer 依赖
        buildozer android update

    - name: Accept Android licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # 动态查找 sdkmanager 路径
        SDKMANAGER=$(find ~/.buildozer -name sdkmanager | grep 'tools/bin/sdkmanager' | head -n 1)
        if [ -z "$SDKMANAGER" ]; then
          echo "Error: sdkmanager not found in Buildozer path"
          exit 1
        fi
        yes | $SDKMANAGER --licenses

    - name: Build with Buildozer
      run: |
        buildozer android debug
        ls -la bin/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: bin/*.apk
