name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发选项

env:
  ANDROID_ACCEPT_LICENSE: "yes"
  ANDROID_BUILD_TOOLS_VERSION: "34.0.0"  # 使用稳定版本
  ANDROID_PLATFORM_VERSION: "33"         # 匹配的Android平台版本

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-8-jdk python3-pip \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo6 cmake android-sdk-platform-tools

    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer==1.5.0 cython virtualenv
        # 确保python-for-android版本兼容
        pip3 install python-for-android==2023.9.16

    - name: Initialize Buildozer and SDK
      run: |
        # 初始化并触发依赖下载
        buildozer android update
        
        # 强制查找sdkmanager路径（兼容不同安装位置）
        SDKMANAGER=$(find ~/.buildozer -name sdkmanager | grep 'tools/bin/sdkmanager' | head -n 1)
        if [ -z "$SDKMANAGER" ]; then
          echo "Error: sdkmanager not found"
          exit 1
        fi
        
        # 接受所有许可证
        yes | $SDKMANAGER --licenses
        
        # 安装指定版本的Build-Tools和平台
        $SDKMANAGER "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}" \
                    "platforms;android-${{ env.ANDROID_PLATFORM_VERSION }}" \
                    "platform-tools"

    - name: Build with Buildozer
      run: |
        # 显式指定Build-Tools版本构建
        export ANDROID_BUILD_TOOLS_VERSION=${{ env.ANDROID_BUILD_TOOLS_VERSION }}
        buildozer android debug
        ls -la bin/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: bin/*.apk
