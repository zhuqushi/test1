name: Android Build with Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发选项

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build with Buildozer Docker
      run: |
        # 创建必要的目录
        mkdir -p ~/.buildozer
        
        # 使用 Docker 运行 Buildozer
        docker run --rm \
          -v $(pwd):/src \
          -v ~/.buildozer:/home/user/.buildozer \
          -e P4A_RELEASE_KEYSTORE=/src/.keystore \
          -e P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.KEYSTORE_PASS }} \
          -e P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.KEYALIAS_PASS }} \
          -e P4A_RELEASE_KEYALIAS=${{ secrets.KEYALIAS }} \
          czaki/buildozer:latest android debug
        
        # 检查构建结果
        ls -la bin/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: bin/*.apk
